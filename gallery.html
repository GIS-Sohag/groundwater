<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض الخرائط - نظام رصد المياه الجوفية</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Network Animation CSS -->
  <link rel="stylesheet" href="css/network-animation.css">

  <!-- Theme Switcher CSS -->
  <link rel="stylesheet" href="css/theme-switcher.css">

  <style>
    :root {
      color-scheme: light dark;
      --bg-primary: #f8fafc;
      --bg-card: #ffffff;
      --bg-card-rgb: 255, 255, 255;
      --text-primary: #1f2a44;
      --text-secondary: #64748b;
      --border-color: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-card: #1e293b;
      --bg-card-rgb: 30, 41, 59;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scrollbar-gutter: stable;
      isolation: isolate;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-primary) !important;
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%;
      color: var(--text-primary);
      overflow-x: hidden;
      /* Prevent horizontal scroll */
    }

    /* --- Theme Transition Fixes --- */
    html.disable-transitions,
    html.disable-transitions *,
    html.disable-transitions *::before,
    html.disable-transitions *::after {
      transition: none !important;
    }

    ::view-transition-group(root) {
      animation-duration: 0s;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    [data-theme="dark"]::view-transition-new(root) {
      z-index: 9999;
    }

    [data-theme="dark"]::view-transition-old(root) {
      z-index: 1;
    }

    [data-theme="light"]::view-transition-old(root) {
      z-index: 9999;
    }

    [data-theme="light"]::view-transition-new(root) {
      z-index: 1;
    }

    /* Network Animation Layering */
    .network-background {
      z-index: 0 !important;
    }

    .header,
    .main-content {
      position: relative !important;
      z-index: 1 !important;
    }

    .network-container canvas {
      display: block !important;
      opacity: 1 !important;
    }

    .navbar {
      background: rgba(var(--bg-card-rgb, 255, 255, 255), 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 0.8rem 0;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.3rem;
      font-weight: 700;
      font-size: clamp(0.9rem, 4vw, 1.2rem);
      /* Responsive font size */
      color: var(--text-primary);
    }

    .logo i {
      color: #ee2a35;
      /* Red like Palestine page */
      font-size: 1.5rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      padding: 0.5rem 0;
      font-size: 0.95rem;
    }

    .nav-link:hover {
      color: var(--accent-blue);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 2px;
      background: var(--accent-blue);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .bar {
      width: 25px;
      height: 3px;
      background-color: var(--text-primary);
      margin: 3px 0;
      transition: 0.4s;
      z-index: 3001;
    }

    /* Professional Hamburger Animation */
    .hamburger .bar {
      transform-origin: center;
    }

    .hamburger.active .bar:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
    }

    .hamburger.active .bar:nth-child(2) {
      opacity: 0;
      transform: translateX(20px);
    }

    .hamburger.active .bar:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
    }

    @media (max-width: 992px) {
      .hamburger {
        display: flex;
      }

      .nav-links {
        position: fixed;
        right: -100%;
        top: 0;
        flex-direction: column;
        background: var(--bg-card);
        width: 75%;
        max-width: 300px;
        height: 100vh;
        text-align: center;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        padding: 6rem 0 2rem;
        justify-content: flex-start;
        z-index: 3000;
      }

      .nav-links.active {
        right: 0;
      }
    }



    /* Main Content */
    .main-content {
      padding: 2rem;
      padding-top: 100px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-title {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .page-title h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
      /* Same gradient as Palestine page */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-title p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Upload Section */
    .upload-section {
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 3rem;
      border: 2px dashed rgba(192, 132, 252, 0.5);
      text-align: center;
      transition: all 0.3s ease;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    .upload-section:hover {
      border-color: #c084fc;
      background: rgba(192, 132, 252, 0.1);
    }

    .upload-section.dragover {
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.2);
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 3rem;
      color: #c084fc;
      margin-bottom: 1rem;
    }

    .upload-text {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .upload-hint {
      opacity: 0.8;
      margin-bottom: 1.5rem;
    }

    .upload-btn {
      background: linear-gradient(45deg, #7c3aed, #a855f7);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    }

    #fileInput {
      display: none;
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .gallery-item {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
      position: relative;
      box-shadow: 0 10px 30px var(--shadow-light);
    }

    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      border-color: #3498db;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(192, 132, 252, 0.1), transparent);
      transition: left 0.5s ease;
      z-index: 1;
    }

    .gallery-item:hover::before {
      left: 100%;
    }

    .gallery-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: all 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      will-change: transform, opacity;
    }

    .gallery-image.loaded {
      opacity: 1;
    }

    .lazy-image {
      background: linear-gradient(45deg, var(--bg-secondary), var(--border-color));
      background-size: 400% 400%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .loading-gallery {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .loading-gallery i {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--accent-blue);
    }

    .image-container {
      position: relative;
      width: 100%;
      height: 250px;
      overflow: hidden;
    }

    .image-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 2rem;
      transition: all 0.3s ease;
      z-index: 1;
    }

    .gallery-item.loaded {
      opacity: 1;
    }

    .loading-gallery {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--text-secondary);
    }

    .loading-gallery i {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #3498db;
    }

    .gallery-item:hover .gallery-image {
      transform: scale(1.05);
    }

    .gallery-info {
      padding: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .gallery-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .gallery-description {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .gallery-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .gallery-date {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gallery-size {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      position: relative;
      margin: 5% auto;
      max-width: 90%;
      max-height: 80%;
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
    }

    /* Zoom & Pan Styles */
    .image-wrapper {
      width: 100%;
      height: 65vh;
      /* Fixed height for viewing area */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.05);
      position: relative;
      cursor: grab;
    }

    .image-wrapper:active {
      cursor: grabbing;
    }

    .modal-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.1s ease-out;
      transform-origin: center center;
    }

    .zoom-controls {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      z-index: 10;
    }

    .zoom-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .zoom-btn:hover {
      background: var(--accent-blue);
      color: white;
      transform: scale(1.1);
    }

    [data-theme="dark"] .image-wrapper {
      background: rgba(255, 255, 255, 0.05);
    }

    .modal-info {
      padding: 1.5rem;
      color: var(--text-primary);
      text-align: center;
    }

    .close {
      position: absolute;
      top: 15px;
      right: 25px;
      color: var(--text-primary);
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 2001;
      background: var(--bg-secondary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close:hover {
      background: var(--accent-red);
      color: white;
      transform: scale(1.1);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      opacity: 0.7;
    }

    .empty-state i {
      font-size: 4rem;
      color: #c084fc;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
        padding-top: 100px;
      }

      .page-title h1 {
        font-size: 2.2rem;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        flex-direction: column;
        gap: 0.5rem;
      }

      .modal-content {
        margin: 10% auto;
        max-width: 95%;
      }
    }
  </style>
</head>

    // Initialize gallery
    function initGallery() {
      galleryImages = [...defaultMaps];
      loadStoredImages();
      renderGallery();
    }

    // Load images from localStorage
    function loadStoredImages() {
      const stored = localStorage.getItem('galleryImages');
      if (stored) {
        const storedImages = JSON.parse(stored);
        galleryImages = [...galleryImages, ...storedImages];
      }
    }

    // Save images to localStorage
    function saveImages() {
      const userImages = galleryImages.filter(img => img.id > 1000);
      localStorage.setItem('galleryImages', JSON.stringify(userImages));
    }

    // Render gallery with performance optimization
    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      const emptyState = document.getElementById('emptyState');

      if (galleryImages.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      // Show loading indicator
      grid.innerHTML = '<div class="loading-gallery"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المعرض...</div>';

      // Use requestAnimationFrame for better performance with lazy loading
      requestAnimationFrame(() => {
        const fragment = document.createDocumentFragment();

        galleryImages.forEach((image, index) => {
          const galleryItem = document.createElement('div');
          galleryItem.className = 'gallery-item';
          galleryItem.style.animationDelay = `${index * 0.03}s`; // Faster animation
          galleryItem.onclick = () => openModal(image.id);

          galleryItem.innerHTML = `
              <div class="image-container">
                <div class="image-placeholder">
                  <i class="fas fa-image"></i>
                  <span>جاري التحميل...</span>
                </div>
                <img data-src="${image.thumbnail || image.src}" alt="${image.title}" class="gallery-image lazy-image" 
                     loading="lazy">
              </div>
              <div class="gallery-info">
                <div class="gallery-title">${image.title}</div>
                <div class="gallery-description">${image.description}</div>
                <div class="gallery-meta">
                  <div class="gallery-date">
                    <i class="fas fa-calendar"></i>
                    ${image.date}
                  </div>
                  <div class="gallery-size">
                    <i class="fas fa-file"></i>
                    ${image.size}
                  </div>
                </div>
              </div>
            `;

          fragment.appendChild(galleryItem);
        });

        grid.innerHTML = '';
        grid.appendChild(fragment);

        // Initialize lazy loading after DOM update
        setTimeout(() => initLazyLoading(), 100);
      });
    }

    // Initialize lazy loading with Intersection Observer
    function initLazyLoading() {
      if (imageObserver) {
        imageObserver.disconnect();
      }

      imageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            const src = img.getAttribute('data-src');

            if (src && !loadedImages.has(src)) {
              loadedImages.add(src);
              img.src = src;
              img.onload = () => imageLoaded(img);
              img.onerror = () => imageError(img);
              imageObserver.unobserve(img);
            }
          }
        });
      }, {
        rootMargin: '100px 0px', // Load images 100px before they come into view
        threshold: 0.1
      });

      // Observe all lazy images
      document.querySelectorAll('.lazy-image').forEach(img => {
        imageObserver.observe(img);
      });
    }

    // Image loading handlers
    function imageLoaded(img) {
      const placeholder = img.parentElement.querySelector('.image-placeholder');
      if (placeholder) {
        placeholder.style.opacity = '0';
        setTimeout(() => placeholder.style.display = 'none', 300);
      }
      img.style.opacity = '1';
      img.parentElement.parentElement.classList.add('loaded');
    }

    function imageError(img) {
      const placeholder = img.parentElement.querySelector('.image-placeholder');
      if (placeholder) {
        placeholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i><br>فشل في التحميل';
        placeholder.style.color = '#e74c3c';
      }
    }

    // Gallery functionality only - upload removed

    // Format file size
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Modal functionality
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const modalInfo = document.getElementById('modalInfo');
    const closeBtn = document.querySelector('.close');
    const imageWrapper = document.getElementById('imageWrapper');
    const downloadBtn = document.getElementById('downloadBtn');

    function openModal(imageId) {
      const image = galleryImages.find(img => img.id === imageId);
      if (image) {
        modalImage.src = image.src;

        // Update download button
        if (downloadBtn) {
          downloadBtn.href = image.src;
          downloadBtn.download = image.title.replace(/ /g, '_') + '.png'; // Suggest a filename
        }

        modalInfo.innerHTML = `
                    <h3>${image.title}</h3>
                    <p>${image.description}</p>
                    <div style="margin-top: 1rem; opacity: 0.8;">
                        <i class="fas fa-calendar"></i> ${image.date} | 
                        <i class="fas fa-file"></i> ${image.size}
                    </div>
                `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        resetZoom(); // Reset zoom when opening new image
      }
    }

    function closeModal() {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display === 'block') {
        closeModal();
      }
    });

    // Zoom & Pan Logic
    let currentScale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX, startY;

    function zoomImage(delta) {
      currentScale += delta;
      if (currentScale < 0.5) currentScale = 0.5;
      if (currentScale > 5) currentScale = 5;
      updateTransform();
    }

    function resetZoom() {
      currentScale = 1;
      translateX = 0;
      translateY = 0;
      updateTransform();
    }

    function updateTransform() {
      if (modalImage) {
        modalImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
      }
    }

    // Mouse Events for Panning
    if (imageWrapper) {
      imageWrapper.addEventListener('mousedown', (e) => {
        if (currentScale > 1) {
          isDragging = true;
          startX = e.clientX - translateX;
          startY = e.clientY - translateY;
          imageWrapper.style.cursor = 'grabbing';
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (isDragging) {
          e.preventDefault();
          translateX = e.clientX - startX;
          translateY = e.clientY - startY;
          updateTransform();
        }
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
        if (imageWrapper) imageWrapper.style.cursor = 'grab';
      });

      // Wheel Zoom
      imageWrapper.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        zoomImage(delta);
      });
    }

    // Show notification
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                color: white;
                padding: 1rem 2rem;
                border-radius: 10px;
                z-index: 3000;
                animation: slideIn 0.3s ease-out;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            `;
      notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i>
                ${message}
            `;

      document.body.appendChild(notification);

      setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease-in forwards';
        setTimeout(() => {
          document.body.removeChild(notification);
        }, 300);
      }, 3000);
    }

    // Add CSS for notification animations
    const style = document.createElement('style');
    style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
    document.head.appendChild(style);

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      initGallery();
    });

    // Mobile menu
    const hamburger = document.querySelector('.hamburger');
    const navMenu = document.querySelector('.nav-links');
    if (hamburger) hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navMenu.classList.toggle('active');
    });
  </script>
